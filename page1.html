<!doctype html>

<style>
body{

}

/* MAIN BOX */
.container-box{

}

.pattern-card{

  color:#d4af37;
  margin-bottom:15px;
}

.suspense{

button{
  font-size: 20px;
  padding:20px 55px;
  background:#d4af37;

}

  position: fixed;
  top: 20px;
  right: 25px;
  font-size: 18px;
  color: #d4af37; /* gold */
  font-weight: 500;
