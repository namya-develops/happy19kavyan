<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    
body {
  background: linear-gradient(
    135deg,
    #000000,
    #0a0a0a,
    #1a1a1a,
    #2b2b2b,
    #3a2f1d
  );
  color: #e6e6e6;
}
    
body{
margin:0;
font-family:sans-serif;
overflow:hidden;
}

.hero{
height:100vh;
background:url("birthday.jpg") center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(1,1,1,0.5);
}

.content{
position:relative;
z-index:2;
}

.timer{
display:flex;
gap:20px;
justify-content:center;
margin-top:30px;
}

.time-box{
background:white;
color:black;
padding:15px 25px;
border-radius:10px;
min-width:90px;
}

.time-box h2{
margin:0;
font-size:2rem;
}

.launch{
display:none;
font-size:3rem;
margin-top:30px;
font-weight:bold;
}

.balloon{
position:absolute;
bottom:-80px;
width:40px;
height:50px;
border-radius:50%;
animation:float 8s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

a {
    color: white;
    text-decoration: none;
}

</style>

</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="content">

<h1 class="display-1 fw-bold">
Birthday Surprise 🎉
</h1>



<div class="timer">

<div class="time-box">
<h2 id="days">0</h2>
<small>Days</small>
</div>

<div class="time-box">
<h2 id="hours">0</h2>
<small>Hours</small>
</div>

<div class="time-box">
<h2 id="minutes">0</h2>
<small>Minutes</small>
</div>

<div class="time-box">
<h2 id="seconds">0</h2>
<small>Seconds</small>
</div>

</div>

<div class="launch" id="launchMessage">
<a href="#" target="_self">🎂 HAPPY BIRTHDAY 🎂 </a>
    <p class="lead">
રૂકાવટ કે લિયે ખેદ હે<br>Don't forget to visit this page at tommorrow morning!
    
</p>
</div>

</div>

</section>

<div class="balloon" style="left:10%;background:#ff4d4d"></div>
<div class="balloon" style="left:30%;background:#ffd93d"></div>
<div class="balloon" style="left:50%;background:#6bcB77"></div>
<div class="balloon" style="left:70%;background:#4d96ff"></div>
<div class="balloon" style="left:90%;background:#ff6bcb"></div>

<script>

let launchDate = new Date("March 26, 2026 00:10:00").getTime();

let timer=setInterval(function(){

let now=new Date().getTime();

let distance=launchDate-now;

let days=Math.floor(distance/(1000*60*60*24));
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((distance%(1000*60*60))/(1000*60));
let seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

if(distance<0){

clearInterval(timer);

document.querySelector(".timer").style.display="none";

document.getElementById("launchMessage").style.display="block";

confetti();

}

},1000);


function confetti(){

for(let i=0;i<200;i++){

let div=document.createElement("div");

div.style.position="fixed";
div.style.width="8px";
div.style.height="8px";
div.style.background="hsl("+Math.random()*360+",100%,50%)";

div.style.left=Math.random()*100+"vw";

div.style.top="-10px";

div.style.animation="fall 3s linear";

document.body.appendChild(div);

}

}


</script>

<style>

@keyframes fall{

0%{transform:translateY(0)}
100%{transform:translateY(100vh)}

}

</style>

</body>
</html>
